name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main 

# Required by AWS OIDC to request secure, temporary tokens
permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-build-files
          path: ./dist
          retention-days: 1

  deploy:
    name: Deploy to AWS S3
    needs: build # Ensures deploy only runs if build succeeds!
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the build files saved by the build job
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-build-files
          path: ./dist

      # Step 2: Log into AWS using OIDC (Zero long-term secrets stored)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::093759681422:role/GitHubActionsPortfolioDeploy
          aws-region: ap-southeast-2 

      # Step 3: Synchronize files to S3 bucket
      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://potfolio-s3-bucket --delete